#baseURL: "https://blog.mrhaydendp.com/"
title: "Hayden's Blog"
theme: PaperMod
pagination:
  pagerSize: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Hayden's Blog"
  description: "A blog for techies."
  keywords: [Blog, Linux, Portfolio]
  author: ["Hayden Plumley"]
  #images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  enableGitInfo: true

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"
    #safari_pinned_tab: "<link / abs url>"

  label:
    text: "Hayden's Blog"
    #icon: /apple-touch-icon.png
    #iconHeight: 35

  # home-info mode
  homeInfoParams:
    Title: '$ echo "Hello World!"'
    Content: "A blog for techies"

  socialIcons:
    - name: github
      url: "https://github.com/mrhaydendp"
    - name: x
      url: "https://x.com/mrhaydendp"
    - name: rss
      url: "https://blog.mrhaydendp.com/index.xml"
    - name: email
      url: "mailto:mrhaydendp@gmail.com"
      

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/mrhaydendp/blog/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: projects
      name: Projects
      url: https://github.com/mrhaydendp?tab=repositories
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /About
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

# Necessary for search
outputs:
  home:
    - HTML
    - RSS
    - JSON
