media:
  - name: images
    label: Images
    input: static/images
    output: /images
    rename: safe
    extensions: [ png, jpg, webp ]

content:
  - name: config
    label: Config
    type: file
    path: hugo.yaml

  - name: about
    label: About
    type: file
    path: content/about.md
    fields:
      - { name: title, label: Title, type: string }
      - { name: body, label: Content, type: rich-text }
    
  - name: posts
    label: Posts
    type: collection
    path: content/posts
    view:
      fields: [ title, description, date, draft ]
    fields:
      - { name: title, label: Title, type: string }
      - { name: description, label: Description, type: string }
      - { name: date, label: Date, type: date }
      - { name: draft, label: Draft, type: boolean }
      - { name: author, label: Author, type: string, default: "Hayden Plumley" }
      - { name: tags, label: Tags, type: string, list: true  }
      - { name: body, label: Content, type: rich-text }
          
  - name: projects
    label: Projects
    type: collection
    path: content/projects